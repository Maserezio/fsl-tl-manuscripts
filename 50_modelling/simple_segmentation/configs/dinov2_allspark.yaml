# Unified segmenter, DINOv2 backbone, AllSpark path enabled.

backbone:
  type: dinov2
  out_channels: 256
  freeze: true

allspark:
  enabled: true
  embedding_channels: 256
  num_heads: 2
  num_class: 2
  patch_num: 1024
  warmup_epoch: 5

decoder:
  num_classes: 1
  hidden: 128

supervoxel:
  n_segments: 0
  compactness: 10
  sigma: 1
  lambda_boundary: 0.5

training:
  crop_size: 448
  batch_size: 2
  epochs: 50
  lr: 0.001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  conf_threshold: 0.9
  amp: true

data:
  data_root: ../00_data/DIVA-HisDB
  manuscript: CB55
  k_shot: 1
  selection_method: grayscale_variance
  num_workers: 4
