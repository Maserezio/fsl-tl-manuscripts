# Unified segmenter, DINOv2 backbone, plain decoder path.

backbone:
  type: dinov2
  out_channels: 256
  freeze: true

allspark:
  enabled: false
  embedding_channels: 256
  num_heads: 2
  num_class: 2
  patch_num: 1024
  warmup_epoch: 5

decoder:
  num_classes: 1
  hidden: 128

supervoxel:
  n_segments: 200
  compactness: 10
  sigma: 1
  lambda_sv: 0.1
  lambda_sv_u: 0.05
  lambda_boundary: 0.5

training:
  crop_size: 448
  batch_size: 4
  epochs: 20
  lr: 0.001
  lr_backbone: 0.00001
  weight_decay: 0.0001
  amp: true
  vis_every: 5

data:
  data_root: ../00_data/DIVA-HisDB
  manuscript: CB55
  k_shot: 1
  selection_method: grayscale_variance
  num_workers: 4
