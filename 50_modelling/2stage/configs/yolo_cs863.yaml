# YOLO training config — CS863 dataset
# Run: python train.py --task yolo --config configs/yolo_cs863.yaml

# Dataset
data: ../00_data/DIVA-HisDB/yolo_dataset_CS863/dataset.yaml

# Hyperparameters
epochs: 100
batch: 16
imgsz: 1024
lr0: 0.001
lrf: 0.01
warmup_epochs: 3
patience: 20

# Output directory (each variant gets its own subfolder)
out_dir: ../71_misc/runs

# Variants to train and compare (name: weights_or_yaml)
variants:
  random_init:    yolov8s.yaml
  dino_distilled: path/to/dino_distilled.pt   # update with actual checkpoint path
  coco_pretrained: yolov8s.pt
